<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AMEYALI — Fuente de Sabiduría</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#07070c;--bg2:#0c0c15;--surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.07);
--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.12);
--primary:#ff6b1a;--primaryG:#ff9040;--primaryDim:rgba(255,107,26,.15);
--accent:#00e5ff;--accentDim:rgba(0,229,255,.12);--accent2:#7c4dff;
--text:#eae8e4;--dim:#7a7a8e;--dimmer:#4a4a5e;
--font:'Outfit',sans-serif;--mono:'Space Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}

/* ===== LAYOUT ===== */
.app{display:grid;grid-template-columns:1fr 440px;height:100vh;width:100vw}

/* ===== AVATAR PANEL ===== */
.avatar-panel{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;overflow:hidden;background:var(--bg)}

/* Animated background */
.avatar-bg{position:absolute;inset:0;overflow:hidden}
.avatar-bg::before{content:'';position:absolute;width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-55%);background:radial-gradient(circle,rgba(255,107,26,.08) 0%,rgba(255,107,26,.02) 40%,transparent 70%);animation:bgPulse 4s ease-in-out infinite}
.avatar-bg::after{content:'';position:absolute;width:300px;height:300px;top:45%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(0,229,255,.05) 0%,transparent 60%);animation:bgPulse 5s ease-in-out infinite 1s}
@keyframes bgPulse{0%,100%{opacity:.6;transform:translate(-50%,-55%) scale(1)}50%{opacity:1;transform:translate(-50%,-55%) scale(1.15)}}

/* Floating particles */
.particles{position:absolute;inset:0;pointer-events:none;z-index:1}
.particle{position:absolute;border-radius:50%;animation:particleFloat linear infinite}
@keyframes particleFloat{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100vh) translateX(var(--drift));opacity:0}}

/* Avatar image */
.avatar-container{position:relative;z-index:2;width:100%;max-width:480px;margin-bottom:0;flex-shrink:0}
.avatar-img-wrapper{position:relative;width:100%;padding-bottom:56%;overflow:visible}
.avatar-img{position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:auto;width:85%;max-width:420px;object-fit:contain;filter:drop-shadow(0 20px 60px rgba(0,0,0,.5));animation:avatarBreath 4s ease-in-out infinite;transition:filter .3s}
@keyframes avatarBreath{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}

/* Avatar glow when speaking */
.avatar-img.speaking{filter:drop-shadow(0 20px 60px rgba(0,229,255,.25)) drop-shadow(0 0 30px rgba(0,229,255,.15))}
.avatar-img.thinking{filter:drop-shadow(0 20px 60px rgba(255,107,26,.3)) drop-shadow(0 0 30px rgba(255,107,26,.15));animation:avatarThink 1.5s ease-in-out infinite}
@keyframes avatarThink{0%,100%{transform:translateX(-50%) translateY(0) rotate(0deg)}25%{transform:translateX(-50%) translateY(-4px) rotate(.5deg)}75%{transform:translateX(-50%) translateY(-2px) rotate(-.5deg)}}

/* Lip sync overlay */
.mouth-overlay{position:absolute;bottom:36%;left:50%;transform:translateX(-50%);width:28px;height:6px;background:rgba(181,84,74,.0);border-radius:50%;transition:all .08s;z-index:3;pointer-events:none}
.mouth-overlay.open-sm{height:8px;width:24px;background:rgba(80,30,25,.35);border-radius:50%;box-shadow:0 0 8px rgba(0,0,0,.2)}
.mouth-overlay.open-md{height:12px;width:28px;background:rgba(80,30,25,.4);border-radius:50%;box-shadow:0 0 10px rgba(0,0,0,.25)}
.mouth-overlay.open-lg{height:16px;width:32px;background:rgba(80,30,25,.45);border-radius:50%;box-shadow:0 0 12px rgba(0,0,0,.3)}

/* Blink overlay */
.blink-overlay{position:absolute;bottom:48%;left:50%;transform:translateX(-50%);width:80px;height:0;background:linear-gradient(to bottom,rgba(198,134,66,.9),rgba(198,134,66,.7));z-index:3;pointer-events:none;transition:height .06s;border-radius:0 0 50% 50%}

/* Controls overlay */
.avatar-controls{position:relative;z-index:4;width:100%;padding:20px 24px 28px;background:linear-gradient(to top,rgba(7,7,12,.95) 60%,transparent);display:flex;flex-direction:column;align-items:center;gap:14px}
.avatar-label{font-size:12px;letter-spacing:5px;text-transform:uppercase;color:var(--primary);font-family:var(--mono);font-weight:700}
.avatar-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.status-dot.listening{background:#ff4444;animation:statusPulse 1s infinite}
.status-dot.thinking{background:var(--primary);animation:statusPulse 1.5s infinite}
.status-dot.speaking{background:var(--accent);animation:statusPulse .8s infinite}
@keyframes statusPulse{0%,100%{box-shadow:0 0 0 0 currentColor}50%{box-shadow:0 0 0 5px transparent}}

/* Waveform */
.waveform{display:flex;align-items:center;gap:2px;height:28px;margin:4px 0}
.wbar{width:3px;border-radius:2px;background:var(--dimmer);height:4px;transition:height .08s,background .2s}
.waveform.active .wbar{background:var(--primary);animation:waveAnim .8s ease-in-out infinite}
.waveform.speaking .wbar{background:var(--accent);animation:waveAnim .6s ease-in-out infinite}
.wbar:nth-child(1){animation-delay:0s!important}.wbar:nth-child(2){animation-delay:.08s!important}
.wbar:nth-child(3){animation-delay:.16s!important}.wbar:nth-child(4){animation-delay:.24s!important}
.wbar:nth-child(5){animation-delay:.32s!important}.wbar:nth-child(6){animation-delay:.24s!important}
.wbar:nth-child(7){animation-delay:.16s!important}.wbar:nth-child(8){animation-delay:.08s!important}
.wbar:nth-child(9){animation-delay:0s!important}
@keyframes waveAnim{0%,100%{height:4px}50%{height:22px}}

/* Mic button */
.controls-row{display:flex;align-items:center;gap:12px}
.mic-btn{width:60px;height:60px;border-radius:50%;border:2px solid var(--primary);background:var(--primaryDim);color:var(--primary);font-size:22px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none}
.mic-btn:active{transform:scale(.92)}
.mic-btn.recording{border-color:#ff4444;background:rgba(255,68,68,.15);color:#ff4444;animation:micPulse 1.2s infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,68,68,.3)}50%{box-shadow:0 0 0 14px transparent}}
.mic-btn:disabled{opacity:.3;pointer-events:none}

.ctrl-btn{padding:8px 16px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:11px;font-family:var(--font);cursor:pointer;transition:all .2s;letter-spacing:1px;font-weight:500;-webkit-user-select:none;user-select:none}
.ctrl-btn:active{transform:scale(.95)}
.ctrl-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accentDim)}

/* ===== CHAT PANEL ===== */
.chat-panel{display:flex;flex-direction:column;background:var(--bg2);border-left:1px solid var(--border)}

.chat-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
.chat-badge{font-size:9px;padding:3px 9px;background:var(--accentDim);color:var(--accent);border-radius:100px;font-family:var(--mono);letter-spacing:1px;font-weight:700}
.lang-btns{display:flex;gap:3px}
.lang-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--dimmer);font-size:10px;font-family:var(--mono);cursor:pointer;transition:all .15s;font-weight:700}
.lang-btn.active{border-color:var(--primary);color:var(--primary);background:var(--primaryDim)}

/* Messages */
.chat-messages{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;overscroll-behavior:contain}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.msg{display:flex;gap:10px;animation:msgSlide .35s cubic-bezier(.16,1,.3,1)}
@keyframes msgSlide{from{opacity:0;transform:translateY(12px)}}
.msg-bubble{max-width:85%;padding:11px 15px;border-radius:16px;font-size:13.5px;line-height:1.55;word-wrap:break-word}
.msg.ai{align-self:flex-start}
.msg.ai .msg-bubble{background:linear-gradient(135deg,rgba(255,107,26,.1),rgba(255,107,26,.04));border:1px solid rgba(255,107,26,.15);border-bottom-left-radius:4px}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.user .msg-bubble{background:var(--surface2);border:1px solid var(--border2);border-bottom-right-radius:4px}
.msg-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
.msg.ai .msg-icon{background:var(--primaryDim);border:1px solid rgba(255,107,26,.2)}
.msg.user .msg-icon{background:var(--surface);border:1px solid var(--border)}
.msg-meta{font-size:9px;color:var(--dimmer);margin-top:5px;font-family:var(--mono);display:flex;align-items:center;gap:5px}
.msg-bubble strong{color:var(--primary)}
.msg-bubble .nahuatl{color:var(--accent);font-style:italic}
.msg-bubble a{color:var(--accent);text-decoration:underline}

/* Typing indicator */
.typing-indicator{display:flex;gap:10px;align-items:flex-end;animation:msgSlide .3s}
.typing-dots{display:flex;gap:4px;padding:14px 18px;background:var(--primaryDim);border:1px solid rgba(255,107,26,.12);border-radius:16px;border-bottom-left-radius:4px}
.typing-dots span{width:6px;height:6px;background:var(--primary);border-radius:50%;animation:dotBounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-6px);opacity:1}}

/* Input */
.chat-input-area{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;background:var(--bg2)}
.chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s;resize:none;min-height:44px;max-height:100px;line-height:1.4}
.chat-input:focus{border-color:var(--primary)}
.chat-input::placeholder{color:var(--dimmer)}
.send-btn{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primaryG));border:none;color:#fff;font-size:16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:active{transform:scale(.9)}
.send-btn:disabled{opacity:.25;pointer-events:none}

/* Error toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;background:rgba(255,68,68,.9);color:#fff;border-radius:10px;font-size:13px;z-index:999;animation:toastIn .3s;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .app{grid-template-columns:1fr;grid-template-rows:42vh 1fr}
  .chat-panel{border-left:none;border-top:1px solid var(--border)}
  .avatar-img{width:70%;max-width:300px}
}
@media(max-width:480px){
  .app{grid-template-rows:38vh 1fr}
  .avatar-controls{padding:12px 16px 18px;gap:10px}
  .avatar-img{width:65%;max-width:260px}
  .chat-header{padding:12px 14px}
  .chat-messages{padding:12px 14px}
  .chat-input-area{padding:10px 12px}
  .mic-btn{width:50px;height:50px;font-size:18px}
}
</style>
</head>
<body>

<div class="app">
  <!-- ===== AVATAR PANEL ===== -->
  <div class="avatar-panel">
    <div class="avatar-bg"></div>
    <div class="particles" id="particles"></div>
    
    <div class="avatar-container">
      <div class="avatar-img-wrapper">
        <img class="avatar-img" id="avatarImg" src="ameyali.png" alt="Ameyali">
        <div class="mouth-overlay" id="mouthOverlay"></div>
        <div class="blink-overlay" id="blinkOverlay"></div>
      </div>
    </div>
    
    <div class="avatar-controls">
      <div class="avatar-label">A M E Y A L I</div>
      <div class="avatar-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Lista para conversar</span>
      </div>
      <div class="waveform" id="waveform">
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      </div>
      <div class="controls-row">
        <button class="ctrl-btn" id="langBtn" onclick="toggleLang()">ES 🇲🇽</button>
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" aria-label="Micrófono">🎤</button>
        <button class="ctrl-btn" id="stopBtn" onclick="stopSpeaking()" style="display:none">⏹ Detener</button>
      </div>
    </div>
  </div>

  <!-- ===== CHAT PANEL ===== -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-title">💬 Ameyali <span class="chat-badge">IA EN VIVO</span></div>
      <div class="lang-btns">
        <button class="lang-btn active" id="langEs" onclick="setLang('es')">ES</button>
        <button class="lang-btn" id="langEn" onclick="setLang('en')">EN</button>
      </div>
    </div>
    <div class="chat-messages" id="chatBox"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" placeholder="Escribe tu pregunta..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// AMEYALI — Production-grade AI Chat Demo
// ============================================================

// --- STATE ---
let lang = 'es';
let isRecording = false;
let isSpeaking = false;
let isProcessing = false;
let recognition = null;
let currentAudio = null;
let history = []; // Conversation history for Claude
let blinkInterval = null;
let lipSyncInterval = null;

// --- DOM REFS ---
const $ = id => document.getElementById(id);
const avatarImg = $('avatarImg');
const mouthOverlay = $('mouthOverlay');
const blinkOverlay = $('blinkOverlay');
const statusDot = $('statusDot');
const statusText = $('statusText');
const waveform = $('waveform');
const micBtn = $('micBtn');
const stopBtn = $('stopBtn');
const chatBox = $('chatBox');
const chatInput = $('chatInput');
const sendBtn = $('sendBtn');

// --- CONFIG ---
const STATUS = {
  es: { ready:'Lista para conversar', listening:'Escuchando...', thinking:'Pensando...', speaking:'Hablando...', error:'Error — intenta de nuevo' },
  en: { ready:'Ready to chat', listening:'Listening...', thinking:'Thinking...', speaking:'Speaking...', error:'Error — try again' }
};

// --- INIT ---
window.addEventListener('load', () => {
  createParticles();
  startBlinking();
  chatInput.addEventListener('input', autoResize);
  chatInput.addEventListener('input', () => { sendBtn.disabled = !chatInput.value.trim(); });
  
  // Welcome message
  setTimeout(() => {
    addAiMessage('¡Tajka\' nēnek! 🌟 Soy **Ameyali**, tu guía virtual en el Museo Laberinto de las Ciencias y las Artes. ¿En qué te puedo ayudar hoy?');
  }, 600);
  
  initSpeechRecognition();
});

// --- PARTICLES ---
function createParticles(){
  const container = $('particles');
  for(let i=0;i<25;i++){
    const p=document.createElement('div');
    p.className='particle';
    const size=2+Math.random()*3;
    const isAccent=Math.random()>.5;
    p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:${-10-Math.random()*20}%;background:${isAccent?'var(--accent)':'var(--primary)'};opacity:${.2+Math.random()*.4};animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*5}s;--drift:${(Math.random()-.5)*100}px`;
    container.appendChild(p);
  }
}

// --- BLINKING ---
function startBlinking(){
  if(blinkInterval) clearInterval(blinkInterval);
  scheduleBlink();
}
function scheduleBlink(){
  blinkInterval = setTimeout(()=>{
    doBlink();
    scheduleBlink();
  }, 2000+Math.random()*4000);
}
function doBlink(){
  blinkOverlay.style.height='6px';
  setTimeout(()=>{blinkOverlay.style.height='0'},100);
}

// --- LIP SYNC ---
function startLipSync(){
  if(lipSyncInterval) clearInterval(lipSyncInterval);
  const classes=['','open-sm','open-md','open-lg','open-md','open-sm'];
  let idx=0;
  lipSyncInterval=setInterval(()=>{
    mouthOverlay.className='mouth-overlay '+classes[idx%classes.length];
    idx++;
  },100+Math.random()*60);
}
function stopLipSync(){
  if(lipSyncInterval){clearInterval(lipSyncInterval);lipSyncInterval=null}
  mouthOverlay.className='mouth-overlay';
}

// --- STATUS ---
function setStatus(key){
  const s=STATUS[lang][key]||key;
  statusText.textContent=s;
  statusDot.className='status-dot'+(key==='listening'?' listening':key==='thinking'?' thinking':key==='speaking'?' speaking':'');
  waveform.className='waveform'+(key==='listening'?' active':key==='speaking'?' speaking':'');
  avatarImg.className='avatar-img'+(key==='speaking'?' speaking':key==='thinking'?' thinking':'');
  stopBtn.style.display=key==='speaking'?'block':'none';
}

// --- SPEECH RECOGNITION ---
function initSpeechRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){console.warn('No Speech Recognition');return}
  recognition=new SR();
  recognition.continuous=false;
  recognition.interimResults=false;
  
  recognition.onresult=e=>{
    const text=e.results[0][0].transcript;
    stopRecording();
    addUserMessage(text,'🎤');
    processMessage(text);
  };
  recognition.onerror=e=>{
    console.error('STT error:',e.error);
    stopRecording();
    if(e.error!=='aborted') setStatus('ready');
  };
  recognition.onend=()=>{if(isRecording)stopRecording()};
}

function toggleMic(){
  if(isSpeaking||isProcessing)return;
  if(isRecording)stopRecording();else startRecording();
}

function startRecording(){
  if(!recognition){showToast(lang==='es'?'Tu navegador no soporta micrófono':'Microphone not supported');return}
  recognition.lang=lang==='es'?'es-MX':'en-US';
  try{
    recognition.start();
    isRecording=true;
    micBtn.classList.add('recording');
    micBtn.textContent='⏸';
    setStatus('listening');
  }catch(e){console.error(e)}
}

function stopRecording(){
  isRecording=false;
  micBtn.classList.remove('recording');
  micBtn.textContent='🎤';
  try{recognition?.stop()}catch(e){}
  if(!isProcessing&&!isSpeaking)setStatus('ready');
}

// --- SEND MESSAGE ---
function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
}

function sendMessage(){
  const text=chatInput.value.trim();
  if(!text||isProcessing)return;
  chatInput.value='';
  sendBtn.disabled=true;
  autoResize();
  addUserMessage(text);
  processMessage(text);
}

// --- PROCESS (CALL AI) ---
async function processMessage(userText){
  if(isProcessing)return;
  isProcessing=true;
  setStatus('thinking');
  showTyping();
  
  history.push({role:'user',content:userText});
  
  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history,lang})
    });
    
    if(!res.ok) throw new Error(`API ${res.status}`);
    const data=await res.json();
    const aiText=data.text||'...';
    
    history.push({role:'assistant',content:aiText});
    removeTyping();
    addAiMessage(aiText);
    
    // Speak the response
    await speakText(aiText);
    
  }catch(err){
    console.error('Chat error:',err);
    removeTyping();
    addAiMessage(lang==='es'?'Disculpa, tuve un problema de conexión. ¿Podrías intentar de nuevo? 🙏':'Sorry, I had a connection issue. Could you try again? 🙏');
    setStatus('error');
    setTimeout(()=>setStatus('ready'),2000);
  }
  
  isProcessing=false;
}

// --- SPEAK (TTS) ---
async function speakText(text){
  const cleanText=text.replace(/\*\*/g,'').replace(/\*/g,'').replace(/[🌟🔬🎨🚀🫶🙏✨💡🌊🏛️]/g,'');
  
  try{
    setStatus('speaking');
    startLipSync();
    
    const res=await fetch('/api/speak',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:cleanText,lang})
    });
    
    if(!res.ok) throw new Error('TTS failed');
    
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    
    return new Promise((resolve)=>{
      currentAudio=new Audio(url);
      currentAudio.onended=()=>{
        stopLipSync();
        setStatus('ready');
        isSpeaking=false;
        currentAudio=null;
        URL.revokeObjectURL(url);
        resolve();
      };
      currentAudio.onerror=()=>{
        stopLipSync();
        setStatus('ready');
        isSpeaking=false;
        currentAudio=null;
        resolve();
      };
      isSpeaking=true;
      currentAudio.play().catch(()=>{
        // Autoplay blocked - fallback to browser TTS
        fallbackSpeak(cleanText);
        resolve();
      });
    });
    
  }catch(err){
    console.error('TTS error:',err);
    // Fallback to browser TTS
    fallbackSpeak(cleanText);
  }
}

function fallbackSpeak(text){
  if(!('speechSynthesis'in window)){stopLipSync();setStatus('ready');return}
  window.speechSynthesis.cancel();
  const utter=new SpeechSynthesisUtterance(text);
  utter.lang=lang==='es'?'es-MX':'en-US';
  utter.rate=.95;utter.pitch=1.1;
  
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(v=>v.lang.startsWith(lang==='es'?'es':'en')&&v.name.toLowerCase().includes('female'))||voices.find(v=>v.lang.startsWith(lang==='es'?'es':'en'));
  if(v)utter.voice=v;
  
  setStatus('speaking');
  startLipSync();
  isSpeaking=true;
  
  utter.onend=()=>{stopLipSync();setStatus('ready');isSpeaking=false};
  utter.onerror=utter.onend;
  window.speechSynthesis.speak(utter);
}

function stopSpeaking(){
  if(currentAudio){currentAudio.pause();currentAudio=null}
  window.speechSynthesis?.cancel();
  stopLipSync();
  setStatus('ready');
  isSpeaking=false;
}

// --- CHAT UI ---
function addUserMessage(text,icon){
  const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const html=`<div class="msg user"><div class="msg-icon">👤</div><div class="msg-bubble">${esc(text)}<div class="msg-meta">${icon?icon+' ':''} ${time}</div></div></div>`;
  chatBox.insertAdjacentHTML('beforeend',html);
  scrollChat();
}

function addAiMessage(text){
  const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const formatted=esc(text)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/(Tajka&#039;[^,\.!<]*|Alwa[^,\.!<]*|Yanél|nēnek|tének|náhuatl|Náhuatl)/gi,'<span class="nahuatl">$1</span>');
  const html=`<div class="msg ai"><div class="msg-icon">🌊</div><div class="msg-bubble">${formatted}<div class="msg-meta">${time}</div></div></div>`;
  chatBox.insertAdjacentHTML('beforeend',html);
  scrollChat();
}

function showTyping(){
  if(chatBox.querySelector('.typing-indicator'))return;
  chatBox.insertAdjacentHTML('beforeend',`<div class="typing-indicator"><div class="msg-icon" style="background:var(--primaryDim);border:1px solid rgba(255,107,26,.2)">🌊</div><div class="typing-dots"><span></span><span></span><span></span></div></div>`);
  scrollChat();
}
function removeTyping(){chatBox.querySelectorAll('.typing-indicator').forEach(t=>t.remove())}

function scrollChat(){requestAnimationFrame(()=>{chatBox.scrollTop=chatBox.scrollHeight})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function autoResize(){
  chatInput.style.height='auto';
  chatInput.style.height=Math.min(chatInput.scrollHeight,100)+'px';
}

// --- LANGUAGE ---
function setLang(l){
  lang=l;
  $('langEs').classList.toggle('active',l==='es');
  $('langEn').classList.toggle('active',l==='en');
  $('langBtn').textContent=l==='es'?'ES 🇲🇽':'EN 🇺🇸';
  chatInput.placeholder=l==='es'?'Escribe tu pregunta...':'Type your question...';
  if(!isProcessing&&!isSpeaking)setStatus('ready');
}
function toggleLang(){setLang(lang==='es'?'en':'es')}

// --- TOAST ---
function showToast(msg){
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// --- VOICES PRELOAD ---
if('speechSynthesis'in window){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices()}
</script>
